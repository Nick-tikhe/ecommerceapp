server:
  port: 9090


spring:
  application:
    name: ApiGateway
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: User
              uri: lb://User
              predicates:
                - Path=/users/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


